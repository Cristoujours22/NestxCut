name: Release

on:
  push:
    tags:
      - 'v*'

defaults:
  run:
    working-directory: cotizador-pro

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: cotizador-pro/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm build:win
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: cotizador-pro/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: node scripts/gen-icon-png.mjs

      - run: pnpm build:mac
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
