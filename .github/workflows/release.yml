name: Release

on:
  push:
    tags:
      - 'v*'

defaults:
  run:
    working-directory: cotizador-pro

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      # Generate PNG icon for Mac (needs to run on macOS for electron-builder to convert to .icns)
      - run: node scripts/gen-icon-png.mjs

      - run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
